<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Contact Us — StoryMagic AI</title>
  <link rel="stylesheet" href="style.css"/>
  <link rel="stylesheet" href="animations.css"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"/>
  <style>html, body { overflow:hidden; height:100%; }</style>
</head>
<body>

  <!-- Background Layers -->
  <div class="bg-stars"></div>
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>
  <div class="orb orb-3"></div>

  <!-- Navigation -->
  <nav class="nav-pill">
    <a href="index.html" class="nav-pill-logo">
      <img src="images/Logo.png" alt="StoryMagic Logo" class="nav-logo-img">
    </a>
    <div class="nav-pill-links">
      <a href="index.html">Home</a>
      <a href="characters.html">Characters</a>
      <a href="parent.html">Parents</a>
    </div>
    <div class="nav-pill-auth"></div>
  </nav>

  <main style="height:calc(100vh - 80px); margin-top:80px; display:flex; align-items:center; justify-content:center; padding:0 24px; box-sizing:border-box; overflow:hidden;">
    <div style="width:100%; max-width:480px;">

      <div style="
        background: rgba(5,2,20,0.82);
        backdrop-filter: blur(28px);
        border: 1.5px solid rgba(168,85,247,0.4);
        border-radius: 32px;
        padding: 28px 36px 24px;
        text-align: center;
        box-shadow: 0 0 80px rgba(168,85,247,0.2), 0 24px 48px rgba(0,0,0,0.5);
        position: relative; overflow: hidden;
      ">
        <!-- shimmer top line -->
        <div style="position:absolute;top:0;left:8%;right:8%;height:1.5px;background:linear-gradient(90deg,transparent,rgba(168,85,247,0.8),rgba(236,72,153,0.8),transparent);"></div>

        <h1 class="dreamy-title" style="font-size:1.8rem; margin-bottom:6px;">Get in <span>Touch</span></h1>
        <p style="color:rgba(255,255,255,0.5); font-size:13px; margin-bottom:20px;">Have a question or a magical idea? Send us a message!</p>

        <form id="contactForm" style="display:flex; flex-direction:column; gap:12px; text-align:left;">
          <div>
            <label style="display:block; margin-bottom:5px; font-size:11px; font-weight:800; letter-spacing:1px; text-transform:uppercase; color:rgba(255,255,255,0.45);">Your Name</label>
            <input type="text" placeholder="Explorer Name" required style="width:100%;box-sizing:border-box;background:rgba(255,255,255,0.07);border:1.5px solid rgba(168,85,247,0.3);border-radius:14px;padding:11px 16px;color:#fff;font-size:14px;outline:none;font-family:inherit;">
          </div>

          <div>
            <label style="display:block; margin-bottom:5px; font-size:11px; font-weight:800; letter-spacing:1px; text-transform:uppercase; color:rgba(255,255,255,0.45);">Email Address</label>
            <input type="email" placeholder="hello@magic.com" required style="width:100%;box-sizing:border-box;background:rgba(255,255,255,0.07);border:1.5px solid rgba(168,85,247,0.3);border-radius:14px;padding:11px 16px;color:#fff;font-size:14px;outline:none;font-family:inherit;">
          </div>

          <div>
            <label style="display:block; margin-bottom:5px; font-size:11px; font-weight:800; letter-spacing:1px; text-transform:uppercase; color:rgba(255,255,255,0.45);">Message</label>
            <textarea placeholder="Type your message here..." rows="3" style="width:100%;box-sizing:border-box;background:rgba(255,255,255,0.07);border:1.5px solid rgba(168,85,247,0.3);border-radius:14px;padding:11px 16px;color:#fff;font-size:14px;outline:none;font-family:inherit;resize:none;"></textarea>
          </div>

          <button type="button" class="btn dreamy-btn-pink jelly-hover" style="width:100%; padding:13px; font-size:15px; margin-top:4px;" onclick="sendContact()">Send Message</button>
        </form>

        <div style="margin-top:16px; padding-top:16px; border-top:1px solid rgba(255,255,255,0.08);">
          <p style="color:rgba(255,255,255,0.4); font-size:12px; margin:0;">Or email us directly at <a href="https://mail.google.com/mail/?view=cm&to=supportstorymagic.ai@gmail.com" target="_blank" style="color:#fbbf24; font-weight:700; text-decoration:none;" onmouseover="this.style.textDecoration='underline'" onmouseout="this.style.textDecoration='none'">supportstorymagic.ai@gmail.com</a></p>
        </div>
      </div>

    </div>
  </main>


  <script src="auth.js"></script>
  <script type="module" src="firebase-db.js"></script>
  <script src="animations.js"></script>
  <script>
    async function sendContact() {
      const inputs   = document.querySelectorAll('#contactForm input, #contactForm textarea');
      const name     = inputs[0].value.trim();
      const email    = inputs[1].value.trim();
      const message  = inputs[2].value.trim();
      if (!name || !email || !message) { alert('Please fill in all fields!'); return; }

      const btn = document.querySelector('#contactForm button');
      btn.textContent = 'Sending…';
      btn.disabled = true;

      // Save to Firebase
      if (typeof window.saveContactMessage === 'function') {
        await window.saveContactMessage(name, email, message);
      }

      btn.textContent = 'Sent!';
      btn.style.background = 'linear-gradient(135deg,#22c55e,#16a34a)';
      setTimeout(() => {
        btn.textContent = 'Send Message';
        btn.style.background = '';
        btn.disabled = false;
        document.getElementById('contactForm').reset();
      }, 2500);
    }
  </script>
</body>
</html>
