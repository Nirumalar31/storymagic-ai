<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <script>
    (function(){try{var u=JSON.parse(localStorage.getItem('currentUser'));if(u)window.location.replace(u.role==='parent'?'parent.html':'index.html');}catch(e){}})();
  </script>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Join the Magic — StoryMagic AI</title>
  <link rel="stylesheet" href="style.css"/>
  <link rel="stylesheet" href="animations.css"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"/>
  <style>
    html, body { overflow: hidden; height: 100%; }
    main.page-wrapper {
      height: calc(100vh - 80px) !important;
      min-height: unset !important;
      margin-top: 80px !important;
      padding-top: 80px !important;
      padding-bottom: 80px !important;
      display: flex !important;
      flex-direction: column !important;
      align-items: center !important;
      justify-content: center !important;
      padding-left: 24px;
      padding-right: 24px;
    }
  </style>
</head>
<body>

  <!-- Background Layers -->
  <div class="bg-stars"></div>
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>
  <div class="orb orb-3"></div>

  <!-- Navigation -->
  <nav class="nav-pill">
    <a href="index.html" class="nav-pill-logo">
      <img src="images/Logo.png" alt="StoryMagic Logo" class="nav-logo-img">
    </a>
    <div class="nav-pill-links">
      <a href="index.html">Home</a>
      <a href="characters.html">Characters</a>
      <a href="parent.html">Parents</a>
    </div>
    <div class="nav-pill-auth"></div>
  </nav>

  <main class="page-wrapper">
    <div style="width:100%; max-width:440px;">

      <div class="glass-panel" style="text-align:center; padding:32px 36px; background:rgba(12,8,35,0.88); border-color:rgba(255,255,255,0.12);">
        <h1 class="dreamy-title" style="font-size:1.9rem; margin-bottom:22px;">Create <span>Account</span></h1>

        <form id="signupForm" style="display:flex; flex-direction:column; gap:12px;">


          <div style="text-align:left;">
            <label class="form-label" style="display:block; margin-bottom:5px; font-weight:500;">Your Name (Parent)</label>
            <input type="text" id="parentName" class="form-input" placeholder="Your Name" required style="background:rgba(255,255,255,0.05);">
          </div>

          <div style="text-align:left;">
            <label class="form-label" style="display:block; margin-bottom:5px; font-weight:500;">Child's Name(s)</label>
            <input type="text" id="childNameSignup" class="form-input" placeholder="e.g. Mia  or  Mia, Leo" required style="background:rgba(255,255,255,0.05);">
            <small style="color:rgba(255,255,255,0.38);font-size:12px;margin-top:4px;display:block;">Separate multiple names with a comma</small>
          </div>

          <div style="text-align:left;">
            <label class="form-label" style="display:block; margin-bottom:5px; font-weight:500;">Email Address</label>
            <input type="email" class="form-input" placeholder="hello@email.com" required style="background:rgba(255,255,255,0.05);">
          </div>

          <div style="text-align:left;">
            <label class="form-label" style="display:block; margin-bottom:5px; font-weight:500;">Password</label>
            <input type="password" class="form-input" placeholder="Min. 6 characters" required style="background:rgba(255,255,255,0.05);">
          </div>

          <button type="button" class="btn dreamy-btn-pink jelly-hover" style="width:100%; margin-top:4px;" onclick="handleSignup()">Create Account</button>
        </form>

        <!-- Success state -->
        <div id="signupSuccess" style="display:none; padding:16px 0;">
          <i class="fa-solid fa-circle-check" style="font-size:48px; color:#22c55e; display:block; margin-bottom:14px;"></i>
          <h2 style="font-family:var(--font-display); font-size:1.5rem; color:#fff; margin:0 0 8px;">Account Created!</h2>
          <p style="color:rgba(255,255,255,0.6); font-size:14px; margin:0 0 6px;">A verification email has been sent to your inbox.</p>
          <p style="color:rgba(255,255,255,0.35); font-size:12px; margin:0 0 4px;">Please verify your email then sign in.</p>
          <p style="color:rgba(255,255,255,0.25); font-size:12px; margin:0;">Redirecting to login…</p>
        </div>

        <p style="margin-top:20px; color:rgba(255,255,255,0.6); font-weight:500; font-size:14px;">
          Already have an account? <a href="login.html" style="color:var(--candy-yellow); text-decoration:none;">Log In</a>
        </p>
      </div>

    </div>
  </main>

  <script src="auth.js"></script>
  <script>
    let selectedParentAvatar = 'images/Profile1.jpeg';

    function pickParentAvatar(img) {
      document.querySelectorAll('.parent-avatar-opt').forEach(el => {
        el.style.border = '3px solid transparent';
        el.style.transform = '';
        el.style.boxShadow = '';
      });
      img.style.border = '3px solid #a855f7';
      img.style.transform = 'scale(1.12)';
      img.style.boxShadow = '0 0 0 3px rgba(168,85,247,0.35)';
      selectedParentAvatar = img.dataset.src;
    }

    async function handleSignup() {
      const inputs    = document.querySelectorAll('.form-input');
      const name      = inputs[0].value.trim();
      const childName = document.getElementById('childNameSignup').value.trim();
      const email     = inputs[2].value.trim();
      const password  = inputs[3].value;

      if (!name || !childName || !email || !password) return showSignupError("Please fill in all fields!");
      if (childName.length < 2) return showSignupError("Please enter your child's name.");
      if (password.length < 6) return showSignupError("Password must be at least 6 characters.");

      const btn = document.querySelector('#signupForm button');
      btn.textContent = 'Creating account…';
      btn.disabled = true;

      try {
        if (window._fbCreateUser) {
          await window._fbCreateUser(email, password, childName, name);
        }
      } catch (err) {
        btn.textContent = 'Start Adventure';
        btn.disabled = false;
        if (err.code === 'auth/email-already-in-use') {
          return showSignupError("This email is already registered. Please log in instead.");
        }
        console.warn('Firebase signup skipped:', err.message);
      }

      // Save parent name + avatar + child name in registry
      const registry = JSON.parse(localStorage.getItem('parentRegistry') || '{}');
      registry[email.toLowerCase()] = { name, avatar: selectedParentAvatar, childName };
      localStorage.setItem('parentRegistry', JSON.stringify(registry));

      // Save child name so dashboard filters correctly after first login
      localStorage.setItem('setting_childName', childName);

      // Show success then redirect to login
      document.getElementById('signupForm').style.display = 'none';
      document.getElementById('signupSuccess').style.display = 'block';
      setTimeout(() => { window.location.href = 'login.html'; }, 2500);
    }

    function showSignupError(msg) {
      let el = document.getElementById('signupError');
      if (!el) {
        el = document.createElement('p');
        el.id = 'signupError';
        el.style.cssText = 'color:#f87171;font-size:14px;margin-top:-10px;font-weight:600;';
        document.getElementById('signupForm').insertBefore(el, document.querySelector('#signupForm button'));
      }
      el.textContent = msg;
    }
  </script>

  <!-- Firebase Auth + Firestore for account creation (module) -->
  <script type="module">
    import { auth, db } from './firebase-config.js';
    import { createUserWithEmailAndPassword, sendEmailVerification } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js';
    import { doc, setDoc } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js';

    window._fbCreateUser = async (email, password, childName, parentName) => {
      const userCredential = await createUserWithEmailAndPassword(auth, email, password);
      // Send verification email
      await sendEmailVerification(userCredential.user);
      // Save child name and parent name to Firestore so it works on any device
      await setDoc(doc(db, 'userSettings', email.toLowerCase()), {
        childName,
        parentName,
        updatedAt: new Date().toISOString()
      }, { merge: true });
    };
  </script>

  <script src="animations.js"></script>
</body>
</html>
