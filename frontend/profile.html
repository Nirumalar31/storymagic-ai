<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>My profile — StoryMagic AI</title>
  <link rel="stylesheet" href="style.css"/>
  <link rel="stylesheet" href="animations.css"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"/>
  <style>
    html, body { overflow: hidden; height: 100%; }

    .pf-card {
      background: rgba(6,3,22,0.82);
      backdrop-filter: blur(28px);
      border: 1.5px solid rgba(168,85,247,0.3);
      border-radius: 28px;
      padding: 30px 28px 26px;
      max-width: 400px; width: 100%;
      box-shadow: 0 0 70px rgba(168,85,247,0.15), 0 24px 48px rgba(0,0,0,0.5);
      position: relative; overflow: hidden;
    }
    .pf-card::before {
      content:''; position:absolute; top:0; left:8%; right:8%; height:1.5px;
      background:linear-gradient(90deg,transparent,rgba(168,85,247,0.7),rgba(236,72,153,0.7),transparent);
    }
    .pf-top { display:flex; align-items:center; gap:16px; margin-bottom:16px; }
    .pf-avatar-wrap { width:82px; height:82px; position:relative; flex-shrink:0; }
    .pf-avatar { width:100%; height:100%; border-radius:50%; object-fit:cover; border:2.5px solid rgba(168,85,247,0.6); box-shadow:0 0 18px rgba(168,85,247,0.4); }
    .pf-cam { position:absolute; bottom:0; right:0; width:24px; height:24px; border-radius:50%; background:linear-gradient(135deg,#ec4899,#a855f7); color:#fff; font-size:10px; display:flex; align-items:center; justify-content:center; cursor:pointer; border:2px solid rgba(6,3,22,0.9); transition:transform 0.2s; }
    .pf-cam:hover { transform:scale(1.15); }
    .pf-title { font-family:var(--font-display); font-size:1.25rem; color:#fff; margin:0 0 3px; }
    .pf-title span { color:#ec4899; }
    .pf-sub { font-size:11px; color:rgba(255,255,255,0.4); margin:0; font-weight:500; }
    .pf-label { font-size:10px; font-weight:800; letter-spacing:1.5px; text-transform:uppercase; color:rgba(255,255,255,0.4); margin-bottom:6px; }
    .pf-input { width:100%; box-sizing:border-box; background:rgba(255,255,255,0.06); border:1.5px solid rgba(168,85,247,0.35); border-radius:12px; padding:12px 16px; color:#fff; font-size:15px; font-weight:600; outline:none; font-family:inherit; transition:border-color 0.2s; margin-bottom:24px; }
    .pf-input:focus { border-color:rgba(236,72,153,0.7); }
    .avatar-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:10px; margin-bottom:16px; }
    .avatar-opt { aspect-ratio:1; border-radius:14px; overflow:hidden; cursor:pointer; border:2.5px solid transparent; transition:all 0.3s cubic-bezier(0.34,1.56,0.64,1); }
    .avatar-opt img { width:100%; height:100%; object-fit:cover; display:block; }
    .avatar-opt:hover { transform:scale(1.05); border-color:rgba(168,85,247,0.5); }
    .avatar-opt.selected { border-color:#fbbf24; box-shadow:0 0 0 3px rgba(251,191,36,0.3); transform:scale(1.07); }
    .pf-btns { display:grid; grid-template-columns:1fr 1fr; gap:10px; }
    .pf-save { padding:11px; border:none; border-radius:12px; background:linear-gradient(135deg,#ec4899,#f97316); color:#fff; font-size:14px; font-weight:800; cursor:pointer; font-family:inherit; box-shadow:0 5px 16px rgba(236,72,153,0.4); transition:transform 0.2s; }
    .pf-save:hover { transform:scale(1.03); }
    .pf-logout { padding:11px; border-radius:12px; border:1.5px solid rgba(239,68,68,0.4); background:rgba(239,68,68,0.12); color:#f87171; font-size:14px; font-weight:800; cursor:pointer; font-family:inherit; transition:all 0.2s; }
    .pf-logout:hover { background:rgba(239,68,68,0.25); color:#fff; }
  </style>
</head>
<body>

  <!-- Background Layers -->
  <div class="bg-stars"></div>
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>
  <div class="orb orb-3"></div>

  <!-- Navigation Header -->
  <nav class="nav-pill">
    <a href="index.html" class="nav-pill-logo">
      <img src="images/Logo.png" alt="StoryMagic Logo" class="nav-logo-img">
    </a>
    <div class="nav-pill-links">
      <a href="index.html">Home</a>
      <a href="characters.html">Characters</a>
      <a href="parent.html">Parents</a>
    </div>
    <div class="nav-pill-auth">
      <!-- Logic in auth.js will fill this -->
    </div>
  </nav>

  <main style="display:flex;align-items:center;justify-content:center;height:calc(100vh - 80px);margin-top:80px;padding:0 20px;box-sizing:border-box;">
    <div class="pf-card">

      <!-- Top: avatar + title -->
      <div class="pf-top">
        <div class="pf-avatar-wrap">
          <img src="images/Profile1.jpeg" id="avatarPreview" class="pf-avatar">
          <label for="avatarUpload" class="pf-cam"><i class="fas fa-camera"></i></label>
          <input type="file" id="avatarUpload" hidden accept="image/*" onchange="previewFile()">
        </div>
        <div>
          <h1 class="pf-title">My Magic <span>Profile</span></h1>
          <p class="pf-sub">Update your name and choose a photo</p>
        </div>
      </div>

      <!-- Name -->
      <div class="pf-label">Your Name</div>
      <input type="text" id="userName" class="pf-input" placeholder="Enter your name" />

      <!-- Photo grid -->
      <div class="pf-label">Choose a Photo</div>
      <div class="avatar-grid" id="avatarGallery"></div>

      <!-- Buttons -->
      <div class="pf-btns">
        <button class="pf-save" onclick="saveProfile()">Save Changes</button>
        <button class="pf-logout" onclick="logout()">Logout</button>
      </div>

    </div>
  </main>

  <!-- Global Footer -->
  <footer class="pro-footer">
    <div class="footer-container">
      <div class="footer-brand">
        <img src="images/Logo.png" alt="StoryMagic Logo" class="footer-logo-img">
        <p>Creating magical moments for every small explorer.</p>
      </div>
      <div class="footer-links">
        <div class="footer-col">
          <h4>Links</h4>
          <ul>
            <li><a href="index.html">Home</a></li>
            <li><a href="characters.html">Characters</a></li>
            <li><a href="parent.html">Parents Dashboard</a></li>
          </ul>
        </div>
      </div>
    </div>
  </footer>

  <script src="auth.js"></script>
  <script>
    let AVATARS = [];
    const PARENT_AVATARS = [
      'images/Profile1.jpeg','images/Profile2.jpeg','images/Profile3.jpeg',
      'images/Profile4.jpeg','images/Profile5.jpeg','images/Profile6.jpeg'
    ];
    const CHILD_AVATARS = [
      'images/Profile7.jpeg','images/Profile8.jpeg','images/Profile9.jpeg',
      'images/Profile10.jpeg','images/Profile11.jpeg','images/Profile12.jpeg'
    ];
    let currentAvatarUrl = 'images/Profile1.jpeg';

    document.addEventListener('DOMContentLoaded', () => {
      const user = JSON.parse(localStorage.getItem('currentUser')) || { name: 'Explorer' };
      document.getElementById('userName').value = user.name || '';
      const isChild = user.role === 'child';
      const defaultAvatar = isChild ? 'images/Profile7.jpeg' : 'images/Profile1.jpeg';
      const savedAvatar = user.avatar && user.avatar.includes('Profile') ? user.avatar : defaultAvatar;
      document.getElementById('avatarPreview').src = savedAvatar;
      currentAvatarUrl = savedAvatar;
      // Override AVATARS based on role
      AVATARS.length = 0;
      (isChild ? CHILD_AVATARS : PARENT_AVATARS).forEach(a => AVATARS.push(a));
      renderGallery();
    });

    function renderGallery() {
      const gallery = document.getElementById('avatarGallery');
      gallery.innerHTML = '';
      AVATARS.forEach(path => {
        const item = document.createElement('div');
        item.className = 'avatar-opt' + (currentAvatarUrl === path ? ' selected' : '');
        item.innerHTML = `<img src="${path}">`;
        item.onclick = () => {
          currentAvatarUrl = path;
          document.getElementById('avatarPreview').src = path;
          renderGallery();
        };
        gallery.appendChild(item);
      });
    }

    function previewFile() {
      const file = document.getElementById('avatarUpload').files[0];
      const reader = new FileReader();
      reader.onloadend = () => {
        currentAvatarUrl = reader.result;
        document.getElementById('avatarPreview').src = reader.result;
        renderGallery();
      };
      if (file) reader.readAsDataURL(file);
    }

    function saveProfile() {
      const name = document.getElementById('userName').value.trim();
      if (!name) return alert("Please enter a name!");
      const user = JSON.parse(localStorage.getItem('currentUser')) || {};
      user.name = name;
      user.avatar = currentAvatarUrl;
      localStorage.setItem('currentUser', JSON.stringify(user));
      window.location.href = user.role === 'parent' ? 'parent.html' : 'index.html';
    }
  </script>
  <script src="animations.js"></script>
</body>
</html>
